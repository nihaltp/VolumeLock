fail_fast: true

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  - repo: local
    hooks:
      - id: ktlint-format
        name: ktlint format
        entry: cmd /c gradlew.bat :app:ktlintFormat
        language: system
        description: "Run ktlint format via Gradle"
        types: [kotlin]
        pass_filenames: false
        files: '\.(kt|kts)$'
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: ktlint-check
        name: ktlint check
        entry: cmd /c gradlew.bat :app:ktlintCheck
        language: system
        description: "Run ktlint Check via Gradle"
        types: [kotlin]
        pass_filenames: false
        files: '\.(kt|kts)$'
        stages: [pre-commit]
